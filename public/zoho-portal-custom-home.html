<!--
  SERNET × Zoho Desk Portal — Custom Home Banner HTML
  
  If Zoho allows custom HTML in the home page banner area,
  paste this to replace the default hero section.
  
  Location: Zoho Desk → Setup → Rebranding → Help Center → Custom HTML
            or Help Center → Home page customization
-->

<style>
  .sernet-hero {
    background: linear-gradient(180deg, #111729 0%, #0a0e1a 100%);
    padding: 64px 20px 48px;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  .sernet-hero__title {
    color: #f8fafc;
    font-size: 2.25rem;
    font-weight: 400;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin: 0 0 12px 0;
  }

  .sernet-hero__subtitle {
    color: #94a3b8;
    font-size: 1rem;
    line-height: 1.6;
    max-width: 540px;
    margin: 0 auto 28px auto;
  }

  .sernet-hero__search {
    max-width: 640px;
    margin: 0 auto;
    position: relative;
  }

  .sernet-hero__search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #64748b;
    pointer-events: none;
  }

  .sernet-hero__search input {
    width: 100%;
    background-color: #111729;
    border: 1px solid #1e293b;
    border-radius: 8px;
    color: #f8fafc;
    font-size: 14px;
    padding: 14px 20px 14px 48px;
    outline: none;
    transition: border-color 0.2s ease;
    box-sizing: border-box;
  }

  .sernet-hero__search input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
  }

  .sernet-hero__search input::placeholder {
    color: #64748b;
  }

  /* Quick-link cards matching SERNET /support page */
  .sernet-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 960px;
    margin: 48px auto 0;
    padding: 0 20px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  .sernet-card {
    background-color: #111729;
    border: 1px solid #1e293b;
    border-radius: 8px;
    padding: 24px;
    text-align: left;
    text-decoration: none !important;
    transition: box-shadow 0.3s ease, border-color 0.3s ease;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .sernet-card:hover {
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    border-color: #3b82f6;
  }

  .sernet-card__icon {
    width: 48px;
    height: 48px;
    background-color: rgba(59, 130, 246, 0.1);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .sernet-card__icon svg {
    width: 24px;
    height: 24px;
    color: #3b82f6;
    stroke: #3b82f6;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .sernet-card__title {
    color: #f8fafc !important;
    font-size: 1rem;
    font-weight: 500;
    margin: 0 0 4px 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sernet-card__title svg {
    width: 14px;
    height: 14px;
    color: #64748b;
    stroke: #64748b;
    fill: none;
    stroke-width: 2;
  }

  .sernet-card__desc {
    color: #94a3b8 !important;
    font-size: 0.8125rem;
    line-height: 1.5;
    margin: 0;
  }

  @media (max-width: 768px) {
    .sernet-cards {
      grid-template-columns: 1fr;
    }
    .sernet-hero__title {
      font-size: 1.75rem;
    }
  }
</style>

<div class="sernet-hero">
  <h1 class="sernet-hero__title">Support</h1>
  <p class="sernet-hero__subtitle">
    Search our knowledge base or get in touch with our support team.
  </p>
  <div class="sernet-hero__search">
    <svg class="sernet-hero__search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" placeholder="Search support articles..." />
  </div>
</div>

<div class="sernet-cards">
  <a href="/portal/en/kb" class="sernet-card">
    <div class="sernet-card__icon">

    </div>
    <div>
      <h3 class="sernet-card__title">
        Knowledge Base
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </h3>
      <p class="sernet-card__desc">Search our knowledge base with over 2000+ support articles</p>
    </div>
  </a>

  <a href="/portal/en/myarea" class="sernet-card">
    <div class="sernet-card__icon">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div>
      <h3 class="sernet-card__title">
        Track Tickets
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </h3>
      <p class="sernet-card__desc">Track existing tickets or raise a new support ticket</p>
    </div>
  </a>

  <a href="https://sernet.lovable.app/insights" class="sernet-card" target="_blank">
    <div class="sernet-card__icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    </div>
    <div>
      <h3 class="sernet-card__title">
        Insights
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </h3>
      <p class="sernet-card__desc">Read our articles, analysis, and market updates</p>
    </div>
  </a>
</div>
